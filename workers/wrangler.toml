name = "allowance-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# --- 공통 바인딩 ---

[[kv_namespaces]]
binding = "ALLOWANCE_KV"
id = "86de71f6641049ada0ada9eb558e2609"

[[d1_databases]]
binding = "DB"
database_name = "allowance-db"
database_id = "10f86ff6-170c-4d75-990c-b7995f88d6f3"

# --- 환경변수 ---
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:4173"
PBKDF2_ITERATIONS = "100000"

# --- Staging 환경 ---
[env.staging]
name = "allowance-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://staging.yongdon.app"
PBKDF2_ITERATIONS = "100000"

[[env.staging.kv_namespaces]]
binding = "ALLOWANCE_KV"
id = "REPLACE_WITH_STAGING_KV_ID"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "allowance-staging-db"
database_id = "REPLACE_WITH_STAGING_D1_ID"

# --- Production 환경 ---
[env.production]
name = "allowance-api-prod"
[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://yongdon.app"
PBKDF2_ITERATIONS = "100000"

[[env.production.kv_namespaces]]
binding = "ALLOWANCE_KV"
id = "REPLACE_WITH_PROD_KV_ID"

[[env.production.d1_databases]]
binding = "DB"
database_name = "allowance-db"
database_id = "REPLACE_WITH_PROD_D1_ID"
